<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 荷物シミュレーター</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            background-color: #f4f6f8;
            color: #333;
        }
        #app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        #canvas-container {
            flex: 1;
            height: 100%;
            position: relative;
        }
        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }
        #sidebar {
            width: 340px;
            height: 100%;
            background: #ffffff;
            border-left: 1px solid #e1e4e8;
            display: flex;
            flex-direction: column;
            box-shadow: -2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .sidebar-header {
            padding: 16px;
            background: #24292e;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .section-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #586069;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .cargo-preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .btn-preset {
            padding: 10px 8px;
            border: 1px solid #d1d5da;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .btn-preset:hover {
            border-color: #0366d6;
            background: #f1f8ff;
            color: #0366d6;
        }
        .color-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .cargo-list {
            list-style: none;
            margin-bottom: 20px;
        }
        .cargo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f6f8fa;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cargo-item:hover {
            background: #edf2f7;
        }
        .cargo-item.selected {
            border-color: #0366d6;
            background: #e6f1fe;
        }
        .cargo-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #e1e4e8;
            background: #fafbfc;
        }
        .btn-delete {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #d73a49;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            opacity: 0.5;
            pointer-events: none;
        }
        .btn-delete.active {
            opacity: 1;
            pointer-events: auto;
        }
        .btn-delete.active:hover {
            background: #cb2431;
        }
        #summary-panel {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-size: 0.85rem;
            pointer-events: none;
        }
    </style>

    <!-- Three.js & OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="app-container">
    <div id="canvas-container">
        <canvas id="canvas3d"></canvas>
        <div id="summary-panel">
            <strong>積載サマリー</strong><br>
            荷物数: <span id="summary-count">0</span> 個<br>
            総重量: <span id="summary-weight">0</span> kg
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">📦 荷物管理</div>
        
        <div class="sidebar-content">
            <div class="section-title">荷物の追加</div>
            <div class="cargo-preset-grid" id="preset-buttons"></div>

            <div class="section-title">📦 全荷物</div>
            <ul class="cargo-list" id="cargo-list"></ul>
        </div>

        <div class="sidebar-footer">
            <button id="delete-btn" class="btn-delete" disabled>🗑️ 選択した荷物を削除</button>
        </div>
    </div>
</div>

<script>
    // --- 荷物プリセットデータ (色を変更) ---
    // ※ 衣川およびラスを「薄いピンク (#FFC0CB / 0xFFC0CB)」に設定
    const CARGO_PRESETS = [
        { name: "衣川", length: 1.0, width: 1.0, height: 1.0, weight: 100, color: 0xFFC0CB, hex: "#FFC0CB" },
        { name: "ラス 3000", length: 3.0, width: 0.8, height: 0.5, weight: 150, color: 0xFFC0CB, hex: "#FFC0CB" },
        { name: "ラス 5000", length: 5.0, width: 0.8, height: 0.5, weight: 250, color: 0xFFC0CB, hex: "#FFC0CB" },
        { name: "標準ケース", length: 0.6, width: 0.4, height: 0.3, weight: 15, color: 0x4A90E2, hex: "#4A90E2" },
        { name: "大型コンテナ", length: 1.2, width: 1.0, height: 0.8, weight: 50, color: 0x50E3C2, hex: "#50E3C2" },
        { name: "小型箱", length: 0.4, width: 0.3, height: 0.2, weight: 5, color: 0xF5A623, hex: "#F5A623" }
    ];

    let scene, camera, renderer, controls;
    let dragObjects = [];
    let selectedObject = null;

    // レンジ・レイキャスト用
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const plane = new THREE.Plane();
    const intersection = new THREE.Vector3();
    const offset = new THREE.Vector3();
    let isDragging = false;

    init();
    animate();

    function init() {
        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('canvas3d');

        // シーン
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f2f5);

        // カメラ
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(5, 5, 7);

        // レンダラー
        renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;

        // ライト
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 床（グリッド）
        const gridHelper = new THREE.GridHelper(10, 20, 0x888888, 0xcccccc);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // カメラ操作
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // UIボタン作成
        renderPresetButtons();

        // イベントリスナー
        canvas.addEventListener('pointerdown', onPointerDown);
        canvas.addEventListener('pointermove', onPointerMove);
        canvas.addEventListener('pointerup', onPointerUp);

        window.addEventListener('resize', onWindowResize);

        // 削除ボタンイベント
        const deleteBtn = document.getElementById('delete-btn');
        if (deleteBtn) {
            deleteBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (selectedObject) {
                    deleteCargo(selectedObject);
                }
            });
        }
    }

    // プリセット追加ボタン生成
    function renderPresetButtons() {
        const container = document.getElementById('preset-buttons');
        container.innerHTML = '';
        CARGO_PRESETS.forEach(preset => {
            const btn = document.createElement('button');
            btn.className = 'btn-preset';
            btn.innerHTML = `
                <span><span class="color-indicator" style="background:${preset.hex}"></span> ${preset.name}</span>
                <span style="font-size:0.75rem; color:#666;">${preset.length}m×${preset.width}m</span>
            `;
            btn.onclick = () => addCargo(preset);
            container.appendChild(btn);
        });
    }

    // 荷物追加処理
    function addCargo(preset) {
        const geometry = new THREE.BoxGeometry(preset.length, preset.height, preset.width);
        const material = new THREE.MeshStandardMaterial({
            color: preset.color,
            roughness: 0.4,
            metalness: 0.1
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        // 初期位置（床の上に置く）
        mesh.position.set(
            (Math.random() - 0.5) * 2,
            preset.height / 2,
            (Math.random() - 0.5) * 2
        );

        // 荷物のメタデータ保持
        mesh.userData = {
            id: Date.now() + Math.random(),
            name: preset.name,
            weight: preset.weight,
            preset: preset
        };

        // 輪郭線を追加
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1 }));
        mesh.add(line);

        scene.add(mesh);
        dragObjects.push(mesh);

        selectObject(mesh);
    }

    // 荷物削除処理
    function deleteCargo(obj) {
        if (!obj) return;
        scene.remove(obj);
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();

        dragObjects = dragObjects.filter(item => item !== obj);
        selectObject(null);
    }

    // 荷物の選択状態変更
    function selectObject(obj) {
        // 全体の発光をクリア
        for (let item of dragObjects) {
            if (item.material && item.material.emissive) {
                item.material.emissive.set(0x000000);
            }
        }

        const deleteBtn = document.getElementById('delete-btn');

        if (obj) {
            selectedObject = obj;
            if (selectedObject.material && selectedObject.material.emissive) {
                selectedObject.material.emissive.set(0x331111);
            }
            if (deleteBtn) {
                deleteBtn.disabled = false;
                deleteBtn.removeAttribute('disabled');
                deleteBtn.classList.add('active');
                deleteBtn.style.pointerEvents = 'auto';
                deleteBtn.style.opacity = '1';
            }
        } else {
            selectedObject = null;
            if (deleteBtn) {
                deleteBtn.disabled = true;
                deleteBtn.setAttribute('disabled', 'true');
                deleteBtn.classList.remove('active');
                deleteBtn.style.pointerEvents = 'none';
                deleteBtn.style.opacity = '0.5';
            }
        }
        updateSummaryAndList();
    }

    // 3D空間クリック / ドラッグ開始
    function onPointerDown(event) {
        if (event.target.tagName !== 'CANVAS') return;

        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(dragObjects, true);

        if (intersects.length > 0) {
            let hitObject = intersects[0].object;
            while (hitObject.parent && !dragObjects.includes(hitObject)) {
                hitObject = hitObject.parent;
            }

            if (dragObjects.includes(hitObject)) {
                isDragging = true;
                selectObject(hitObject);

                plane.setFromNormalAndCoplanarPoint(
                    camera.getWorldDirection(plane.normal).negate(),
                    selectedObject.position
                );

                if (raycaster.ray.intersectPlane(plane, intersection)) {
                    offset.copy(intersection).sub(selectedObject.position);
                }
                controls.enabled = false;
            }
        } else {
            selectObject(null);
        }
    }

    // ドラッグ移動中
    function onPointerMove(event) {
        if (!isDragging || !selectedObject) return;

        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        if (raycaster.ray.intersectPlane(plane, intersection)) {
            selectedObject.position.copy(intersection.sub(offset));
            // 床下にいかないようY軸固定（または底面高さに調整）
            const boxHeight = selectedObject.geometry.parameters.height || 0.5;
            if (selectedObject.position.y < boxHeight / 2) {
                selectedObject.position.y = boxHeight / 2;
            }
        }
    }

    // ドラッグ終了
    function onPointerUp() {
        isDragging = false;
        controls.enabled = true;
    }

    // リスト＆サマリーの更新
    function updateSummaryAndList() {
        const countSpan = document.getElementById('summary-count');
        const weightSpan = document.getElementById('summary-weight');
        const listUl = document.getElementById('cargo-list');

        countSpan.textContent = dragObjects.length;
        const totalWeight = dragObjects.reduce((sum, item) => sum + item.userData.weight, 0);
        weightSpan.textContent = totalWeight;

        listUl.innerHTML = '';
        dragObjects.forEach((obj) => {
            const li = document.createElement('li');
            li.className = 'cargo-item' + (obj === selectedObject ? ' selected' : '');
            li.innerHTML = `
                <div class="cargo-info">
                    <span class="color-indicator" style="background:${obj.userData.preset.hex}"></span>
                    <strong>${obj.userData.name}</strong>
                </div>
                <span style="font-size:0.8rem; color:#666;">${obj.userData.weight} kg</span>
            `;
            li.onclick = (e) => {
                e.stopPropagation();
                selectObject(obj);
            };
            listUl.appendChild(li);
        });
    }

    function onWindowResize() {
        const container = document.getElementById('canvas-container');
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
